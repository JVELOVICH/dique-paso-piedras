name: Actualizar datos dique

on:
  schedule:
    - cron: "30 10 * * *"  # Todos los días a las 07:30 hs Argentina (UTC-3)
  workflow_dispatch:         # También permite ejecutarlo manualmente desde GitHub

jobs:
  update-csv:
    runs-on: ubuntu-latest

    permissions:
      contents: write        # Necesario para hacer commit del CSV

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar script
        run: python fetch_data.py

      - name: Hacer commit del CSV actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datos.csv
          git diff --cached --quiet || git commit -m "📊 Actualización diaria: $(date +'%Y-%m-%d')"
          git push
